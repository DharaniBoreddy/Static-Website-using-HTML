<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="" alt="" height="15px">
    <a href="index.html">go to home</a>
    <fieldset>
        <legend>user detials</legend>
            <center>
                <form action="">
                    <label for="User Name">User Name</label>
                    <input type="text" value="User Name" name="User Name" placeholder="Enter the Name" required><br><br>
                    <label for="Password">Password</label>
                    <input type="Password" name="password" placeholder="enter the password" required><br><br>
                    <label for="Email">Email</label>
                    <input type="Email" name="Email" placeholder="enter the eamil" required><br><br>
                    <label for="phone number">phone number:</label>
                    <input type="text" name="phone number" maxlength="10"><br><br>
                    <label for="location">location</label>
                    <select>
                        <option value="bangalore">bangalore</option>
                        <option value="chennai">chennai</option>
                        <option value="Andhar"></option>
                    </select><br><br>
                    <label for="gender">gender</label>
                        <input type="radio" value="female" name="gender">Female
                        <input type="radio" value="male" name="gender" checked>male 
                        <input type="radio" value="Other" name="Othere">Other<br><br>
                    <label for="Skill">Skill</label>
                        <input type="checkbox">HTML
                        <input type="checkbox">css
                        <input type="checkbox">java <br><br>
                    <label for="college">collegename:</label>
                        <input list="college">
                        <datalist id="college">
                            <option value="mpc">
                            <option value="sku">
                            <option value="kvm">
                        </datalist><br><br>
                    <label for="DOB">DOB:</label>
                        <input type="date" id="DOB" name="DOB" ><br><br>
                    <label for="stream">stream:</label>
                        <input type="text" id="computer science" name="computer science" placeholder="computer science"><br><br>
                    <label for="feedback">feedback:</label>
                        <textarea name="feedback" id="feedback" row="10" cols="20"></textarea><br><br>
                        <p>Attach resume:<p>
                    <label for="file"></label>
                        <input type="file" id="file" placeholder="choose project file"><br><br>
                        <button>submit</button>
                </form>
                </center>
    </fieldset>
</body>
</html>
